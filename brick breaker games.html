<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start / Quick Option</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #666;
            font-family: Arial, sans-serif;
        }

        .menu {
            background: #eee;
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        button {
            width: 140px;
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .start {
            background: #2e7d32;
        }

        .quick {
            background: #1565c0;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="menu">
    <h2>Select an Option</h2>
    <button class="start" onclick="startGame()">Start</button>
    <button class="quick" onclick="quickGame()">Quick</button>
</div>

<script>
    function startGame() {
        window.location.href = "brickbreaker.html";
    }

    function quickGame() {
        window.location.href = "brickbreaker.html?mode=quick";
    }
</script>

</body>
</html>
